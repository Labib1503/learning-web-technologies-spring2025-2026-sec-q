<!DOCTYPE html>
<html>
<head>
    <title>Name Validation</title>
</head>
<body>

<h2>Name</h2>

<form onsubmit="return validateName()">
    <input type="text" id="name">
    <br><br>
    <input type="submit" value="Submit">
</form>

<script>
function validateName() {
    var name = document.getElementById("name").value.trim();


  var regex = /^[A-Za-z][A-Za-z.\-]*\s+[A-Za-z.\-]+$/;

  if (name == "") {
    alert("Name cannot be empty");
    return false;
  }

  if (!regex.test(name)) {
    alert("Enter at least two words, start with a letter, only letters/dot/dash allowed");
    return false;
  }

  return true;
}
</script>

</body>
</html>
