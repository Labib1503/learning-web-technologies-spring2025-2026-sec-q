<!DOCTYPE html>
<html>
    <head>
        <title>Person Profile</title>
    </head>
    <body>

        <h2>Person Profile</h2>

        <form onsubmit="return validateAll()">

            Name:<br>
            <input type="text" id="name"><br><br>

            Email:<br>
            <input type="text" id="email"><br><br>

            Gender:<br>
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
            <input type="radio" name="gender" value="Other"> Other
            <br><br>

            Date of Birth:<br>
            DD: <input type="text" id="dd" size="2"> /
            MM: <input type="text" id="mm" size="2"> /   
            YYYY: <input type="text" id="yyyy" size="4">
            <br><br>

            Blood Group:<br>
            <select id="blood"> 
                <option value="">Select Blood Group</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
            <br><br>

            Degree:<br>
            <input type="checkbox" name="degree" value="SSC"> SSC
            <input type="checkbox" name="degree" value="HSC"> HSC
            <input type="checkbox" name="degree" value="BSc"> BSc
            <input type="checkbox" name="degree" value="MSc"> MSc
            <br><br>

            Photo:<br>
            <input type="file" id="photo"><br><br>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

        </form>

        <script>
            function validateAll(){

                var nameRegex = /^[a-zA-Z\s]+$/;
                var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                var name = document.getElementById("name").value.trim();
                var email = document.getElementById("email").value.trim();
                var blood = document.getElementById("blood").value;
                var photo = document.getElementById("photo").value;

                var dd = parseInt(document.getElementById("dd").value);
                var mm = parseInt(document.getElementById("mm").value); 
                var yyyy = parseInt(document.getElementById("yyyy").value);
                
                var gender = document.getElementsByName("gender");
                var degree = document.getElementsByName("degree");

                if (!nameRegex.test(name)) {
                    alert("Invalid name");
                    return false;
                }

                if (!emailRegex.test(email)) {
                    alert("Invalid email");
                    return false;
                }

                var gSelected = false;
                for (var i=0; i < gender.length; i++){
                    if(gender[i].checked)
                        gSelected = true;
                        
                        if (!gSelected){
                            alert("Select at least one gender");
                            return false;
                    }
                }

                    if (isNaN(dd) || dd < 1 || dd > 31 || isNaN(mm) || mm < 1 || mm > 12 || isNaN(yyyy) || yyyy < 1900 || yyyy > new Date().getFullYear()) {
                        alert("Invalid date of birth");
                        return false;
                    }

                    var dSelected = false;
                    for (var i = 0; i < degree.length; i++) {
                        if (degree[i].checked) {
                            dSelected = true;
                        }
                    }

                    if (!dSelected) {
                        alert("Select degree");
                        return false;
                    }

                if (blood === "") {
                    alert("Please select a blood group");
                    return false;
                }

                if (photo === "") {
                    alert("Please upload a photo");
                    return false;
                }
            }
        </script>
    </body>
</html>
