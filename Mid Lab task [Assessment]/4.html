<!DOCTYPE html>
<html>
    <head>
        <title>Date of Birth Validation</title>
    </head>
    <body>

        <h2>Date of Birth</h2>

        <form onsubmit="return validateDOB()">
          DD: <input type="text" id="dd" size="2">
          MM: <input type="text" id="mm" size="2">
          YYYY: <input type="text" id="yyyy" size="4">
          <br><br>
          <input type="submit" value="Submit">
        </form>

        <script>
            function validateDOB(){
                var dd = parseInt(document.getElementById("dd").value);
                var mm = parseInt(document.getElementById("mm").value);
                var yyyy = parseInt(document.getElementById("yyyy").value);

                if (isNaN(dd) || isNaN(mm) || isNaN(yyyy)){
                    alert("All fields required");
                    return false;
                }
                
                if (dd < 1 || dd > 31){
                    alert("Invalid day (1-31)");
                    return false;
                }

                if (mm < 1 || mm > 12){
                    alert("Invalid month (1-12)");
                    return false;
                }

                if (yyyy < 1900 || yyyy > new Data().getFullYear()){
                    alert("Invalid year (1900-" + new Date().getFullYear() + ")");
                    return false;
                }

                return true;
            }
        </script>

    </body>
</html>
