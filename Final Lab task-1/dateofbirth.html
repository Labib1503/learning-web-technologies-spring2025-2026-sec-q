<!DOCTYPE html>
<html>
    <head>
        <title>Date of Birth</title>
    </head>
    <body>
        <form method="post" action="dateofbirth.php" enctype="multipart/form-data">
            <fieldset>
                <legend>Date of Birth</legend>
                <label for="dd">DD:</label>
                <input type="text" name="dd" size="2" placeholder="dd"> /
                <label for="mm">MM:</label>
                <input type="text" name="mm" size="2" placeholder="mm"> /
                <label for="yyyy">YYYY:</label>
                <input type="text" name="yyyy" size="4" placeholder="yyyy"><br><br>
                <input type="submit" name="submit" value="Submit">
            </fieldset>
        </form>
    </body>
</html>
