<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile</title>
</head>
<body>
    <table cellspacing="0" border="1" width="80%">
        <tr>
            <th colspan="3"><h2>Personal Profile</h2></th>
        </tr>
        <tr>
            <td>&nbsp; Name</td>
            <td>&nbsp; <input type="text" name="name" value=""/></td>
            <td></td>
        </tr>
        <tr>
            <td>&nbsp; Email</td>
            <td>&nbsp; <input type="email" name="email" value=""/></td>
            <td></td>
        </tr>
        <tr>
            <td>&nbsp; Gender</td>
            <td>&nbsp; <input type="radio" name="gender" value="male"/> Male
                <input type="radio" name="gender" value="female"/> Female
            <input type="radio" name="gender" value="other"/> Other</td>
            <td></td>
        </tr>
        <tr>
            <td>&nbsp; Date of Birth</td>
            <td>&nbsp;<input type= "text" size="2" maxlength="2" name="" value=""/> / 
                <input type="text" size="2" maxlength="2" name="" value=""/> /
                <input type="text" size="4" maxlength="4" name="" value=""/>(dd/mm/yyyy)</td>
            <td></td>
        </tr>
        <tr>
            <td>&nbsp; Blood Group</td>
            <td>&nbsp; <select>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select></td>
            <td></td>
        </tr>
        <tr>
            <td>&nbsp; Degree</td>
            <td>&nbsp; <input type="checkbox" name="" value=""/> SSC
                <input type="checkbox" name="" value=""/> HSC   
                <input type="checkbox" name="" value=""/> BSc
                <input type="checkbox" name="" value=""/> MSc</td>
            <td></td>
            <td>&nbsp; &nbsp; &nbsp;</td>
        </tr>
        <tr>
            <td>&nbsp; Photo</td>
            <td colspan="2">&nbsp;<input type="file" id=""></td>
        </tr>
        <tr>
            <td colspan="3"><br></td>
        </tr>
        <tr>
            <td align="right" colspan="3">
                <input type="button" name="" value="Submit">
                <input type="button" name="" value="Reset">&nbsp;
            </td>
        </tr>
    </table>
</body>
</html>
